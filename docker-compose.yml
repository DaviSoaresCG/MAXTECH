services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maxtech_app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # If you use the Gemini AI integration, you can provide the key here:
      # - GEMINI_API_KEY=your_gemini_api_key_here
    restart: always
